services:

  # ── Databases ──────────────────────────────────────────────────────────────

  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: workforce
      MYSQL_USER: workforce
      MYSQL_PASSWORD: workforce
    ports:
      # Host port 3307 avoids conflicts with local Windows MySQL.
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysql -u workforce -pworkforce -e 'SELECT COUNT(*) FROM workforce.roles' 2>/dev/null | grep -q '[1-9]'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - workforce-net

  mongo-db:
    image: mongo:7.0
    container_name: mongo-db
    restart: "no"
    environment:
      MONGO_INITDB_ROOT_USERNAME: workforce
      MONGO_INITDB_ROOT_PASSWORD: workforce
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./database/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - workforce-net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: "no"
    environment:
      PMA_HOST: mysql-db
      PMA_USER: workforce
      PMA_PASSWORD: workforce
    ports:
      - "8080:80"
    depends_on:
      - mysql-db
    networks:
      - workforce-net

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: "no"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: workforce
      ME_CONFIG_MONGODB_ADMINPASSWORD: workforce
      ME_CONFIG_MONGODB_URL: mongodb://workforce:workforce@mongo-db:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"
    depends_on:
      - mongo-db
    networks:
      - workforce-net

  # ── Backend Microservices ───────────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: backend/api-gateway/Dockerfile
    container_name: api-gateway
    restart: "no"
    ports:
      - "8000:8000"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - auth-service
      - user-role-service
      - order-service
      - planning-service
      - time-service
      - absence-vacation-service
      - billing-service
      - report-media-service
    networks:
      - workforce-net

  auth-service:
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    container_name: auth-service
    restart: "no"
    ports:
      - "8001:8001"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/workforce
      SPRING_DATASOURCE_USERNAME: workforce
      SPRING_DATASOURCE_PASSWORD: workforce
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - workforce-net

  user-role-service:
    build:
      context: .
      dockerfile: backend/user-role-service/Dockerfile
    container_name: user-role-service
    restart: "no"
    ports:
      - "8002:8002"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/workforce
      SPRING_DATASOURCE_USERNAME: workforce
      SPRING_DATASOURCE_PASSWORD: workforce
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - workforce-net

  order-service:
    build:
      context: .
      dockerfile: backend/order-service/Dockerfile
    container_name: order-service
    restart: "no"
    ports:
      - "8003:8003"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/workforce
      SPRING_DATASOURCE_USERNAME: workforce
      SPRING_DATASOURCE_PASSWORD: workforce
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - workforce-net

  planning-service:
    build:
      context: .
      dockerfile: backend/planning-service/Dockerfile
    container_name: planning-service
    restart: "no"
    ports:
      - "8004:8004"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/workforce
      SPRING_DATASOURCE_USERNAME: workforce
      SPRING_DATASOURCE_PASSWORD: workforce
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - workforce-net

  time-service:
    build:
      context: .
      dockerfile: backend/time-service/Dockerfile
    container_name: time-service
    restart: "no"
    ports:
      - "8005:8005"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/workforce
      SPRING_DATASOURCE_USERNAME: workforce
      SPRING_DATASOURCE_PASSWORD: workforce
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - workforce-net

  absence-vacation-service:
    build:
      context: .
      dockerfile: backend/absence-vacation-service/Dockerfile
    container_name: absence-vacation-service
    restart: "no"
    ports:
      - "8006:8006"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/workforce
      SPRING_DATASOURCE_USERNAME: workforce
      SPRING_DATASOURCE_PASSWORD: workforce
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - workforce-net

  billing-service:
    build:
      context: .
      dockerfile: backend/billing-service/Dockerfile
    container_name: billing-service
    restart: "no"
    ports:
      - "8007:8007"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/workforce
      SPRING_DATASOURCE_USERNAME: workforce
      SPRING_DATASOURCE_PASSWORD: workforce
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - workforce-net

  report-media-service:
    build:
      context: .
      dockerfile: backend/report-media-service/Dockerfile
    container_name: report-media-service
    restart: "no"
    ports:
      - "8008:8008"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://workforce:workforce@mongo-db:27017/workforce-media?authSource=admin
    depends_on:
      - mongo-db
    networks:
      - workforce-net

  # ── Frontends ──────────────────────────────────────────────────────────────

  admin-web:
    build:
      context: ./frontend/admin-web
    container_name: admin-web
    restart: "no"
    ports:
      - "3001:80"
    networks:
      - workforce-net

  hr-web:
    build:
      context: ./frontend/hr-web
    container_name: hr-web
    restart: "no"
    ports:
      - "3002:80"
    networks:
      - workforce-net

  shiftlead-web:
    build:
      context: ./frontend/shiftlead-web
    container_name: shiftlead-web
    restart: "no"
    ports:
      - "3003:80"
    networks:
      - workforce-net

volumes:
  mysql-data:
  mongo-data:

networks:
  workforce-net:
    driver: bridge

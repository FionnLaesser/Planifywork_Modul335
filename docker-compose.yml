services:

  # ── Databases ──────────────────────────────────────────────────────────────

  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: workforce
      MYSQL_USER: workforce
      MYSQL_PASSWORD: workforce
    ports:
      # Host port 3307 avoids conflicts with local Windows MySQL.
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysql -u workforce -pworkforce -e 'SELECT COUNT(*) FROM workforce.roles' 2>/dev/null | grep -q '[1-9]'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - workforce-net

  mongo-db:
    image: mongo:7.0
    container_name: mongo-db
    restart: "no"
    environment:
      MONGO_INITDB_ROOT_USERNAME: workforce
      MONGO_INITDB_ROOT_PASSWORD: workforce
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./database/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - workforce-net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: "no"
    environment:
      PMA_HOST: mysql-db
      PMA_USER: workforce
      PMA_PASSWORD: workforce
    ports:
      - "8080:80"
    depends_on:
      - mysql-db
    networks:
      - workforce-net

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: "no"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: workforce
      ME_CONFIG_MONGODB_ADMINPASSWORD: workforce
      ME_CONFIG_MONGODB_URL: mongodb://workforce:workforce@mongo-db:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"
    depends_on:
      - mongo-db
    networks:
      - workforce-net

  # ── Backend Microservices ───────────────────────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    container_name: auth-service
    restart: "no"
    ports:
      - "8001:8001"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_NAME: workforce
      SPRING_DATASOURCE_USERNAME: workforce
      SPRING_DATASOURCE_PASSWORD: workforce
    depends_on:
      mysql-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -w 1 localhost 8001 </dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - workforce-net

  user-role-service:
    build:
      context: .
      dockerfile: backend/user-role-service/Dockerfile
    container_name: user-role-service
    restart: "no"
    ports:
      - "8002:8002"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_NAME: workforce
      SPRING_DATASOURCE_USERNAME: workforce
      SPRING_DATASOURCE_PASSWORD: workforce
    depends_on:
      mysql-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -w 1 localhost 8002 </dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - workforce-net

  order-service:
    build:
      context: .
      dockerfile: backend/order-service/Dockerfile
    container_name: order-service
    restart: "no"
    ports:
      - "8003:8003"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_NAME: workforce
      SPRING_DATASOURCE_USERNAME: workforce
      SPRING_DATASOURCE_PASSWORD: workforce
    depends_on:
      mysql-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -w 1 localhost 8003 </dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - workforce-net

  planning-service:
    build:
      context: .
      dockerfile: backend/planning-service/Dockerfile
    container_name: planning-service
    restart: "no"
    ports:
      - "8004:8004"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_NAME: workforce
      SPRING_DATASOURCE_USERNAME: workforce
      SPRING_DATASOURCE_PASSWORD: workforce
    depends_on:
      mysql-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -w 1 localhost 8004 </dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - workforce-net

  time-service:
    build:
      context: .
      dockerfile: backend/time-service/Dockerfile
    container_name: time-service
    restart: "no"
    ports:
      - "8005:8005"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_NAME: workforce
      SPRING_DATASOURCE_USERNAME: workforce
      SPRING_DATASOURCE_PASSWORD: workforce
    depends_on:
      mysql-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -w 1 localhost 8005 </dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - workforce-net

  absence-vacation-service:
    build:
      context: .
      dockerfile: backend/absence-vacation-service/Dockerfile
    container_name: absence-vacation-service
    restart: "no"
    ports:
      - "8006:8006"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_NAME: workforce
      SPRING_DATASOURCE_USERNAME: workforce
      SPRING_DATASOURCE_PASSWORD: workforce
    depends_on:
      mysql-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -w 1 localhost 8006 </dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - workforce-net

  billing-service:
    build:
      context: .
      dockerfile: backend/billing-service/Dockerfile
    container_name: billing-service
    restart: "no"
    ports:
      - "8007:8007"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_NAME: workforce
      SPRING_DATASOURCE_USERNAME: workforce
      SPRING_DATASOURCE_PASSWORD: workforce
    depends_on:
      mysql-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -w 1 localhost 8007 </dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - workforce-net

  report-media-service:
    build:
      context: .
      dockerfile: backend/report-media-service/Dockerfile
    container_name: report-media-service
    restart: "no"
    ports:
      - "8008:8008"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://workforce:workforce@mongo-db:27017/workforce-media?authSource=admin
    depends_on:
      mongo-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -w 1 localhost 8008 </dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - workforce-net

  flipper-auth-service:
    build:
      context: .
      dockerfile: backend/flipper-auth-service/Dockerfile
    container_name: flipper-auth-service
    restart: "no"
    ports:
      - "8009:8009"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_NAME: workforce
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_DATASOURCE_USERNAME: workforce
      SPRING_DATASOURCE_PASSWORD: workforce
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FLIPPER_AUTH_SEED_DEFAULT_USERS: "false"
    depends_on:
      mysql-db:
        condition: service_healthy
      user-role-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -w 1 localhost 8009 </dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - workforce-net

  config-service:
    build:
      context: ./backend/config-service
      dockerfile: Dockerfile
    container_name: config-service
    restart: "no"
    ports:
      - "8010:8010"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_NAME: workforce
      SPRING_DATASOURCE_USERNAME: workforce
      SPRING_DATASOURCE_PASSWORD: workforce
    depends_on:
      mysql-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -w 1 localhost 8010 </dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - workforce-net

  api-gateway:
    build:
      context: .
      dockerfile: backend/api-gateway/Dockerfile
    container_name: api-gateway
    restart: "no"
    ports:
      - "8000:8000"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      auth-service:
        condition: service_healthy
      user-role-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      planning-service:
        condition: service_healthy
      time-service:
        condition: service_healthy
      absence-vacation-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      report-media-service:
        condition: service_started
      flipper-auth-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "nc -w 1 localhost 8000 </dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - workforce-net

  # ── Frontends ──────────────────────────────────────────────────────────────

  admin-web:
    build:
      context: ./frontend/admin-web
    container_name: admin-web
    restart: "no"
    ports:
      - "3001:80"
    networks:
      - workforce-net

  hr-web:
    build:
      context: ./frontend/hr-web
    container_name: hr-web
    restart: "no"
    ports:
      - "3002:80"
    networks:
      - workforce-net

  shiftlead-web:
    build:
      context: ./frontend/shiftlead-web
    container_name: shiftlead-web
    restart: "no"
    ports:
      - "3003:80"
    networks:
      - workforce-net

  flipper-auth-web:
    build:
      context: ./frontend/flipper-auth-web
    container_name: flipper-auth-web
    restart: "no"
    ports:
      - "3004:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - workforce-net

volumes:
  mysql-data:
  mongo-data:

networks:
  workforce-net:
    driver: bridge

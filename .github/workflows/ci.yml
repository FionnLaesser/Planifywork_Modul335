name: CI – Workforce Management System

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Verhindert parallele Runs auf demselben Branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Job 1: API-Tests gegen laufende Docker-Infrastruktur ──────────────────
  api-tests:
    name: API Tests (Auth / User / Planning / Absence / Billing)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Docker Compose – alle Services bauen und starten
        run: docker compose up --build -d

      - name: Warten bis MySQL healthy ist
        run: |
          echo "Warte auf MySQL..."
          timeout 120 bash -c \
            'until docker inspect mysql-db --format "{{.State.Health.Status}}" 2>/dev/null | grep -q "healthy"; do
              echo "MySQL noch nicht bereit, warte 5s..."; sleep 5
            done'
          echo "MySQL ist healthy."

      - name: Seed-User prüfen (user-role-service)
        run: |
          echo "Warte auf Seed-User..."
          timeout 120 bash -c \
            'until docker compose logs user-role-service 2>/dev/null | grep -q "Seed-User angelegt"; do
              sleep 3
            done'
          echo "Seed-User angelegt."

      - name: Warten bis API-Gateway erreichbar ist
        run: |
          timeout 90 bash -c \
            'until curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/auth/login \
              -X POST -H "Content-Type: application/json" \
              -d "{\"username\":\"admin\",\"password\":\"password\"}" | grep -q "200"; do
              echo "Gateway noch nicht bereit, warte 5s..."; sleep 5
            done'
          echo "API-Gateway bereit."

      - name: API-Testlauf ausführen
        run: node tests/api-test.js

      - name: Logs bei Fehler anzeigen
        if: failure()
        run: |
          echo "=== api-gateway ==="
          docker compose logs --tail=50 api-gateway
          echo "=== auth-service ==="
          docker compose logs --tail=50 auth-service
          echo "=== user-role-service ==="
          docker compose logs --tail=50 user-role-service
          echo "=== absence-vacation-service ==="
          docker compose logs --tail=50 absence-vacation-service
          echo "=== billing-service ==="
          docker compose logs --tail=50 billing-service
          echo "=== planning-service ==="
          docker compose logs --tail=50 planning-service

      - name: Docker Compose stoppen und aufräumen
        if: always()
        run: docker compose down -v

  # ── Job 2: Frontend-Builds verifizieren ───────────────────────────────────
  frontend-build:
    name: Frontend Build – ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      fail-fast: false
      matrix:
        app: [admin-web, hr-web, shiftlead-web]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/${{ matrix.app }}/package.json

      - name: npm install – ${{ matrix.app }}
        run: npm install
        working-directory: frontend/${{ matrix.app }}

      - name: npm build – ${{ matrix.app }}
        run: npm run build
        working-directory: frontend/${{ matrix.app }}

  # ── Job 3: Backend kompiliert und Unit-Tests (Maven) ──────────────────────
  backend-test:
    name: Backend Unit Tests (Maven)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Maven compile (alle Services)
        run: mvn compile -q

      - name: Maven test (Services mit H2-Tests)
        run: mvn test -q -pl backend/auth-service,backend/absence-vacation-service,backend/planning-service,backend/flipper-auth-service

      - name: Konfigurations-Schutztests (Routing, Ports, JWT, ddl-auto)
        run: mvn test -q -pl backend/api-gateway

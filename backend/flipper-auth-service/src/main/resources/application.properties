spring.application.name=flipper-auth-service
server.port=8009

# MySQL-Datenbank (shared mit anderen Services)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:workforce}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=workforce
spring.datasource.password=workforce

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
flipper-auth.seed-default-users=true

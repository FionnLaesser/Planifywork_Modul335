server:
  port: 8000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:3001"
              - "http://localhost:3002"
              - "http://localhost:3003"
              - "http://localhost:3004"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://auth-service:8001
          predicates:
            - Path=/api/auth/**

        - id: user-role-service
          uri: http://user-role-service:8002
          predicates:
            - Path=/api/users/**

        - id: order-service
          uri: http://order-service:8003
          predicates:
            - Path=/api/orders/**

        - id: planning-service
          uri: http://planning-service:8004
          predicates:
            - Path=/api/planning/**

        - id: time-service
          uri: http://time-service:8005
          predicates:
            - Path=/api/time/**

        - id: absence-vacation-service
          uri: http://absence-vacation-service:8006
          predicates:
            - Path=/api/absences/**

        - id: billing-service
          uri: http://billing-service:8007
          predicates:
            - Path=/api/billing/**

        - id: report-media-service
          uri: http://report-media-service:8008
          predicates:
            - Path=/api/media/**

        - id: flipper-auth-service
          uri: http://flipper-auth-service:8009
          predicates:
            - Path=/api/flipper-auth/**

jwt:
  secret: workforce-super-secret-jwt-key-change-in-production-min-256-bits

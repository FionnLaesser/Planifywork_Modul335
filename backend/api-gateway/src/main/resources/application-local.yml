spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8001
          predicates:
            - Path=/api/auth/**

        - id: user-role-service
          uri: http://localhost:8002
          predicates:
            - Path=/api/users/**

        - id: order-service
          uri: http://localhost:8003
          predicates:
            - Path=/api/orders/**

        - id: planning-service
          uri: http://localhost:8004
          predicates:
            - Path=/api/planning/**

        - id: time-service
          uri: http://localhost:8005
          predicates:
            - Path=/api/time/**

        - id: absence-vacation-service
          uri: http://localhost:8006
          predicates:
            - Path=/api/absences/**

        - id: billing-service
          uri: http://localhost:8007
          predicates:
            - Path=/api/billing/**

        - id: report-media-service
          uri: http://localhost:8008
          predicates:
            - Path=/api/media/**
